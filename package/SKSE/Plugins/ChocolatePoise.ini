[Settings]
; 0 : Allow damage at any time 
; 1 : Disable damage when already staggered
StaggerMode = 1

[PassivePoise]
; Passive poise is the anti-flinch pool for player/NPCs.
; If you stop taking poise damage for RefillDelaySeconds, it refills rapidly at RefillRatePerSecond.
RefillDelaySeconds = 2.0
RefillRatePerSecond = 20.0

[Stance]
; Stance is the boss/creature posture-break pool (invisible).
; If you stop dealing stance damage for RefillDelaySeconds, it refills rapidly at RefillRatePerSecond.
RefillDelaySeconds = 8.0
RefillRatePerSecond = 40.0
; After a stance break, ignore further stance breaks for a short window.
BreakCooldownSeconds = 2.0

[Health]
BaseMult    = 10.0
ArmorMult   = 0.5
RegenRate   = 0.03

[Damage]
BashMult 	 = 2.0
BowMult 	 = 1.0
CreatureMult = 1.0
MeleeMult 	 = 1.0
UnarmedMult  = 1.5

ToPCMult = 1.0
ToNPCMult = 1.0

WeightContribution 	   = 0.5
GauntletWeightContribution = 0.5
UnarmedSkillContribution   = 0.1

[TrueHUD]
SpecialBar = true
IgnoreValhallaCombat = false
